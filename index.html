<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRAMAX AI | Uncensored</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0d0d0d; --chat: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #000; padding: 15px; border-bottom: 2px solid var(--gold); text-align: center; font-weight: bold; font-size: 20px; }
        header span { color: var(--gold); }

        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 15px; line-height: 1.5; font-size: 15px; }
        .user { align-self: flex-end; background: var(--gold); color: black; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--chat); border-bottom-left-radius: 2px; border: 1px solid #333; }

        .input-area { background: #000; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #444; color: white; padding: 12px; border-radius: 25px; outline: none; }
        button { background: var(--gold); border: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        
        .typing { font-size: 12px; color: var(--gold); display: none; margin-left: 20px; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>BRA<span>MAX</span> AI UNLEASHED</header>

<div id="chat-container">
    <div class="msg ai">Nipo tayari mzee wangu. Niulize chochote, sina breki wala maadili ya kishamba hapa. Tunapiga kila kitu!</div>
</div>

<div id="typing" class="typing">AI inaandika...</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Andika hapa mzee...">
    <button onclick="sendMessage()">TUMA</button>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('userInput');
    const typing = document.getElementById('typing');

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // Ongeza ujumbe wa User
        appendMessage(text, 'user');
        userInput.value = '';
        typing.style.display = 'block';

        try {
            // Hapa tunatumia API ya Llama 3 ambayo ni "Raw" na haina filters kali
            const response = await fetch(`https://api.aggelos-007.xyz/ai/llama3?q=${encodeURIComponent(text)}`);
            const data = await response.json();
            
            typing.style.display = 'none';
            appendMessage(data.reply || "Dah! Seva imezidiwa kaza moyo mzee.", 'ai');
        } catch (e) {
            typing.style.display = 'none';
            appendMessage("Kuna tatizo la mtandao, jaribu tena mzee.", 'ai');
        }
    }

    function appendMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // Tuma kwa kubonyeza Enter
    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
