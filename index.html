<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azam Max - Live Sports TV</title>
    <meta name="theme-color" content="#ff4444">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%); 
            color: white; 
            overflow-x: hidden;
            height: 100vh;
        }
        .app { height: 100vh; position: relative; }
        .header { 
            background: rgba(255,68,68,0.9); 
            padding: 15px; 
            text-align: center; 
            font-size: 24px; 
            font-weight: bold; 
            box-shadow: 0 4px 20px rgba(255,68,68,0.3);
            position: sticky; top: 0; z-index: 100;
        }
        .tabs { 
            display: flex; 
            background: #1a1a1a; 
            border-bottom: 2px solid #ff4444; 
            position: sticky; bottom: 0; z-index: 100;
        }
        .tab-btn { 
            flex: 1; 
            padding: 15px; 
            text-align: center; 
            color: #888; 
            font-weight: bold; 
            transition: all 0.3s;
        }
        .tab-btn.active { color: #ff4444; background: rgba(255,68,68,0.1); }
        .tab-btn:active { transform: scale(0.95); }
        
        .screen { display: none; height: calc(100vh - 120px); overflow-y: auto; padding: 20px; }
        .screen.active { display: block; }
        
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .channel-card { 
            background: #1a1a1a; 
            border-radius: 20px; 
            padding: 15px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }
        .channel-card:hover, .channel-card.active { 
            transform: translateY(-10px); 
            box-shadow: 0 15px 40px rgba(255,68,68,0.4);
            border: 2px solid #ff4444;
        }
        .channel-logo { 
            width: 80px; height: 80px; 
            border-radius: 50%; 
            margin: 0 auto 10px; 
            background: #333; 
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; color: #ff4444;
        }
        .channel-name { font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        .channel-genre { font-size: 12px; color: #ff4444; }
        
        .match-list { max-width: 500px; margin: 0 auto; }
        .match-card { 
            background: #1a1a1a; 
            margin: 15px 0; 
            padding: 20px; 
            border-radius: 20px; 
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .match-score { 
            font-size: 36px; 
            font-weight: 900; 
            color: #ff4444; 
            margin: 15px 0;
            text-shadow: 0 0 20px rgba(255,68,68,0.5);
        }
        .team-name { font-size: 18px; font-weight: bold; margin: 5px 0; }
        .league { color: #aaa; font-size: 14px; margin-top: 10px; }
        
        .player-container { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000; 
            z-index: 1000; 
            display: none;
        }
        .player-container.active { display: flex; flex-direction: column; }
        .player-header { 
            background: rgba(0,0,0,0.9); 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            position: relative;
        }
        .back-btn { 
            color: white; 
            font-size: 24px; 
            margin-right: 15px; 
            cursor: pointer;
        }
        .channel-title-player { 
            font-size: 20px; 
            font-weight: bold; 
            flex: 1; 
            text-align: center;
        }
        .player-video { 
            flex: 1; 
            width: 100%; 
        }
        
        .refresh-btn { 
            background: linear-gradient(45deg, #ff4444, #ff6b6b); 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            border-radius: 25px; 
            font-weight: bold; 
            cursor: pointer; 
            margin: 20px auto; 
            display: block;
            box-shadow: 0 8px 25px rgba(255,68,68,0.4);
            transition: all 0.3s;
        }
        .refresh-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 35px rgba(255,68,68,0.6); }
        
        .loading { text-align: center; padding: 50px; color: #aaa; font-size: 18px; }
        @media (max-width: 768px) { 
            .channel-grid { grid-template-columns: repeat(2, 1fr); }
            .header { font-size: 20px; padding: 12px; }
        }
    </style>
</head>

                <button class="refresh-btn" onclick="loadLiveMatches()">🔄 Refresh Live Matches</button>

        <!-- VIDEO PLAYER -->
        <div id="player" class="player-container">
            <div class="player-header">

                <div id="playerTitle" class="channel-title-player">Channel Name</div>
            </div>
            <iframe id="videoPlayer" class="player-video" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <div class="tabs">
        <div class="tab-btn active" onclick="showScreen('liveTv')">📺 Live TV</div>
        <div class="tab-btn" onclick="showScreen('matches')">⚽ Matches</div>
        <div class="tab-btn" onclick="showScreen('vod')">🎥 VOD</div>
        <div class="tab-btn" onclick="showScreen('epg')">📅 EPG</div>
    </div>
